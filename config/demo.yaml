app:
  title: "GovCon Partner Radar"
  subtitle: "Public demo using curated public and synthetic records"
  default_fiscal_year: 2026
  fiscal_years: [2025, 2026]
  currency_units: "USD"
  target_agencies:
    - "Department of the Navy"
    - "NAVSEA"
    - "Team Submarine"
    - "CDAO"
    - "DISA"
  capability_keywords:
    - "data analytics"
    - "Power BI"
    - "AI"
    - "machine learning"
    - "knowledge management"
    - "SharePoint"
    - "RAG"
    - "LLM"
    - "digital transformation"
    - "data governance"

database:
  path: "data/govcon_radar.duckdb"

sample_data:
  agencies: "data/demo/agencies.csv"
  vendors: "data/demo/vendors.csv"
  contract_vehicles: "data/demo/contract_vehicles.csv"
  awards: "data/demo/awards.csv"
  opportunities: "data/demo/opportunities.csv"
  capture_notes: "data/demo/capture_notes.csv"
  agency_spending: "data/sample/agency_spending.csv"
  prime_contractors: "data/sample/prime_contractors.csv"
  capability_markets: "data/sample/capability_markets.csv"

scoring:
  weights_file: "config/scoring_weights.yml"
  weights:
    obligations: 0.30
    agency_alignment: 0.25
    small_business_partnering: 0.20
    past_performance: 0.15
    cyber_readiness: 0.10

dashboards:
  executive_overview:
    top_agencies_limit: 6
    top_contractors_limit: 8
  agency_spending_explorer:
    default_agency: "Department of the Navy"
  prime_contractor_intelligence:
    minimum_partner_score: 70
